artprima_prometheus_metrics:
    namespace: altered_core
    disable_default_metrics: true
    storage:
        type: apcu

when@test:
    artprima_prometheus_metrics:
        storage:
            type: in_memory

when@prod:
    artprima_prometheus_metrics:
        namespace: altered_core
        storage:
            type: redis
            url: '%env(REDIS_URL)%'
